<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ subject }}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f6f6f6;">
    <div style="font-family: Arial, sans-serif; max-width: 600px; margin: auto; background-color: #ffffff; padding: 20px;">
        <!-- Preview Text (Hidden from main body but visible in some email clients) -->
        <div style="display: none; max-height: 0px; overflow: hidden;">
            {{ preview_text }}
        </div>

        <!-- Header -->
        <h2 style="color: #333333;">{{ subject }}</h2>
        
        <p style="color: #555555;">Hi {{ subscriber.first_name }},</p>
        
        <!-- Main HTML Content -->
        <div style="margin-top: 20px; margin-bottom: 30px; color: #333333; line-height: 1.6;">
            {{ html_content|safe }}
        </div>
        
        <!-- Call to Action -->
        <div style="margin-top: 30px; text-align: center;">
            <a href="{{ article_url }}" style="background-color: #007bff; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block;">
                Read the Full Article
            </a>
        </div>

        <hr style="margin-top: 40px; border: none; border-top: 1px solid #eeeeee;">
        
        <!-- Footer / Unsubscribe -->
        <div style="font-size: 12px; color: #999999; text-align: center; margin-top: 20px;">
            <p>You are receiving this email because you are an active subscriber.</p>
            <p>
                No longer want to receive these emails? 
                <!-- Prompt explicitly asks for /api/unsubscribe/?email={{ subscriber.email }} link. 
                     Note: Normally URLs should be absolute using a frontend domain, but sticking to prompt spec. -->
                <a href="/api/unsubscribe/?email={{ subscriber.email }}" style="color: #999999; text-decoration: underline;">
                    Unsubscribe here
                </a>
            </p>
        </div>
    </div>
</body>
</html>
